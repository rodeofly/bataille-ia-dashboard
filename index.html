<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bataille de l'IA - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

<nav id="main-nav">
    <button onclick="UI.go('intro')">🏠 <span>ACCUEIL</span></button>
    <button onclick="UI.go('time')">📅 <span>TIMELINE</span></button>
    <button onclick="UI.go('enjeu')">⚡ <span>ENJEUX</span></button>
    <button onclick="UI.go('scen')">🎬 <span>SCÉNARIOS</span></button>
    <hr>
    <button onclick="window.open('https://app.wooclap.com/VOTRE_CODE', '_blank')">🗳️ <span>VOTE LIVE</span></button>
</nav>

<main>
    <section id="intro" class="screen active">
        <h1>Bataille de l'IA</h1>
        <div class="flip-container main-card" onclick="this.classList.toggle('flipped')">
            <div class="flipper">
                <div class="card-face card-front" style="background-image: url('0_Lancement/carte_000.jpg')"></div>
                <div class="card-face card-back" style="background-image: url('0_Lancement/carte_001.jpg')"></div>
            </div>
        </div>
    </section>

    <section id="time" class="screen">
        <h1 class="title-time">Chronologie Interactive</h1>
        <div id="timeline-row">
            <div class="drop-zone" id="dz-1"></div>
            <div class="drop-zone" id="dz-2"></div>
            <div class="drop-zone" id="dz-3"></div>
            <div class="drop-zone" id="dz-4"></div>
            <div class="drop-zone" id="dz-5"></div>
        </div>
        <div id="draw-area">
            <div id="temp-card-slot" class="drop-zone"></div>
            <button id="btn-draw-time" class="btn-draw" onclick="Game.drawTimeline()">Piocher un événement</button>
        </div>
        <div id="trash-zone">🗑️</div>
    </section>

    <section id="enjeu" class="screen">
        <h1 class="title-enjeux">Enjeux de l'IA</h1>
        <div id="enjeu-card" class="flip-container" onclick="this.classList.toggle('flipped')">
            <div class="flipper">
                <div id="enjeu-front" class="card-face card-front"></div>
                <div id="enjeu-back" class="card-face card-back"></div>
            </div>
        </div>
        <button class="btn-draw" onclick="Game.drawRandom('enjeu')">Piocher un Enjeu</button>
    </section>

    <section id="scen" class="screen">
        <h1 class="title-scen">Scénario de Crise</h1>
        <div id="scen-card" class="flip-container" onclick="this.classList.toggle('flipped')">
            <div class="flipper">
                <div id="scen-front" class="card-face card-front"></div>
                <div id="scen-back" class="card-face card-back"></div>
            </div>
        </div>
        <button class="btn-draw" onclick="Game.drawRandom('scen')">Nouveau Scénario</button>
    </section>
</main>

<script>
// LOGIQUE DIRECTE POUR EVITER LES ERREURS DE FICHIER
const CONFIG = {
    timeline: { path: '1_Timeline', start: 4, end: 49 },
    enjeu:    { path: '2_Enjeux',   start: 50, end: 85 },
    scen:     { path: '4_Scénarios', start: 120, end: 139 }
};

const UI = {
    go(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(id);
        if(target) {
            target.classList.add('active');
            gsap.fromTo(target, { opacity: 0 }, { opacity: 1, duration: 0.5 });
        }
    },
    pad: (n) => String(n).padStart(3, '0')
};

const Game = {
    cardIdCounter: 0,
    drawTimeline() {
        const slot = document.getElementById('temp-card-slot');
        if(slot.children.length > 0) return;
        const cfg = CONFIG.timeline;
        let rand = Math.floor(Math.random() * (cfg.end - cfg.start + 1)) + cfg.start;
        if (rand % 2 !== 0) rand--; 
        this.cardIdCounter++;
        const id = `card-${this.cardIdCounter}`;
        const card = document.createElement('div');
        card.id = id; card.className = 'timeline-card'; card.draggable = true;
        card.innerHTML = `<div class="flipper" style="width:100%; height:100%; pointer-events:none;"><div class="card-face card-front" style="background-image: url('${cfg.path}/carte_${UI.pad(rand)}.jpg')"></div><div class="card-face card-back" style="background-image: url('${cfg.path}/carte_${UI.pad(rand+1)}.jpg')"></div></div>`;
        card.ondragstart = (e) => e.dataTransfer.setData("textID", e.target.id);
        card.onclick = () => card.parentElement.classList.contains('drop-zone') && card.parentElement.id !== 'temp-card-slot' && card.classList.toggle('flipped');
        slot.appendChild(card);
        gsap.from(card, { scale: 0, rotate: -10, duration: 0.4 });
        this.updateBtnState();
    },
    updateBtnState() {
        document.getElementById('btn-draw-time').disabled = (document.getElementById('temp-card-slot').children.length > 0);
    },
    drawRandom(type) {
        const cfg = CONFIG[type];
        const container = document.getElementById(`${type}-card`);
        container.classList.remove('flipped');
        let rand = Math.floor(Math.random() * (cfg.end - cfg.start + 1)) + cfg.start;
        if (rand % 2 !== 0) rand--;
        document.getElementById(`${type}-front`).style.backgroundImage = `url('${cfg.path}/carte_${UI.pad(rand)}.jpg')`;
        document.getElementById(`${type}-back`).style.backgroundImage = `url('${cfg.path}/carte_${UI.pad(rand+1)}.jpg')`;
        gsap.fromTo(container, { x: 300, opacity: 0 }, { x: 0, opacity: 1, duration: 0.6, ease: "power3.out" });
    }
};

// INIT DRAG & DROP
document.querySelectorAll('.drop-zone, #trash-zone').forEach(zone => {
    zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('drag-over'); };
    zone.ondragleave = () => zone.classList.remove('drag-over');
    zone.ondrop = (e) => {
        e.preventDefault(); zone.classList.remove('drag-over');
        const card = document.getElementById(e.dataTransfer.getData("textID"));
        if(!card) return;
        if(zone.id === 'trash-zone') {
            gsap.to(card, { scale: 0, opacity: 0, duration: 0.3, onComplete: () => { card.remove(); Game.updateBtnState(); }});
        } else {
            if(zone.children.length > 0 && zone.id !== 'temp-card-slot') document.getElementById('temp-card-slot').appendChild(zone.children[0]);
            zone.appendChild(card);
            Game.updateBtnState();
        }
    };
});
</script>
</body>
</html>
